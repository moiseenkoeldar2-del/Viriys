<script>
const SERVER_IP = "Alinohkapvp.aternos.me:41805";
const MY_NICK = "alinohka";       // Ваш ник
const FRIEND_NICK = "Ник_Друга";  // Сюда напишите точный ник вашего друга!

let isFriendOnline = false; // Флаг отслеживания друга

async function checkServer() {
    const statusDiv = document.getElementById('serverStatus');
    const listDiv = document.getElementById('playerList');
    
    statusDiv.className = "status-indicator";
    statusDiv.innerText = "Обновление...";
    
    try {
        const response = await fetch(`https://mcsrvstat.us{SERVER_IP}`);
        const data = await response.json();
        
        if (data.online) {
            const currentPlayers = data.players.online;
            const maxPlayers = data.players.max;
            
            statusDiv.innerText = `Онлайн: ${currentPlayers} / ${maxPlayers}`;
            statusDiv.classList.add('online');
            
            if (data.players.list && data.players.list.length > 0) {
                listDiv.innerHTML = "";
                let foundFriend = false;

                data.players.list.forEach(player => {
                    const name = player.name;
                    const lowName = name.toLowerCase();
                    
                    if (lowName === MY_NICK.toLowerCase()) {
                        // Ваша подсветка
                        listDiv.innerHTML += `<span class="player-tag" style="background: #ffaa00; color: #000; font-weight: bold;">👑 ${name}</span>`;
                    } else if (lowName === FRIEND_NICK.toLowerCase()) {
                        // Подсветка вашего друга
                        listDiv.innerHTML += `<span class="player-tag" style="background: #0078d7; color: #fff; font-weight: bold;">🔵 ${name}</span>`;
                        foundFriend = true;
                    } else {
                        // Обычные игроки
                        listDiv.innerHTML += `<span class="player-tag">👤 ${name}</span>`;
                    }
                });

                // Голосовое оповещение ТОЛЬКО когда заходит друг
                if (foundFriend && !isFriendOnline) {
                    playFriendAlert();
                    isFriendOnline = true; 
                } else if (!foundFriend) {
                    isFriendOnline = false; 
                }

            } else {
                isFriendOnline = false;
                if (currentPlayers > 0) {
                    listDiv.innerHTML = `<div class="empty-server">Игроки есть (${currentPlayers}), но ники скрыты.</div>`;
                } else {
                    listDiv.innerHTML = `<div class="empty-server">На сервере никого нет</div>`;
                }
            }
        } else {
            isFriendOnline = false;
            statusDiv.innerText = "Сервер оффлайн";
            statusDiv.classList.add('offline');
            listDiv.innerHTML = `<div class="empty-server">Включите сервер в панели Aternos</div>`;
        }
        
    } catch (error) {
        statusDiv.innerText = "Ошибка подключения";
        statusDiv.classList.add('offline');
        listDiv.innerHTML = `<div class="empty-server">Не удалось связаться с API</div>`;
        console.error(error);
    }
}

// Озвучка захода друга
function playFriendAlert() {
    if ('speechSynthesis' in window) {
        let notification = new SpeechSynthesisUtterance(`Внимание! Ваш друг ${FRIEND_NICK} зашёл на сервер!`);
        notification.lang = "ru-RU";
        notification.rate = 1.0; 
        window.speechSynthesis.speak(notification);
    }
}

checkServer();
setInterval(checkServer, 30000); // Проверка каждые 30 секунд
</script>
